<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nümtema Keywords & Intent Clustering - Module A</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-primary: #edebe7;
            --bg-card: #ffffff;
            --text-primary: #1e332a;
            --text-secondary: #5a7065;
            --accent: #486a5a;
            --accent-hover: #3d5e4f;
            --accent-glow: rgba(72, 106, 90, 0.12);
            --glass-border: rgba(30, 51, 42, 0.08);
            --success: #486a5a;
            --warning: #f0ad4e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 80px;
            background: #f5f4f0;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            gap: 2rem;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
            align-items: center;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            text-decoration: none;
        }

        .nav-item.active {
            color: #ffffff;
            background: var(--accent);
            box-shadow: 0 4px 12px rgba(72, 106, 90, 0.25);
        }

        .sidebar-footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .main-content {
            margin-left: 80px;
            flex: 1;
            padding: 2.5rem 3.5rem;
            max-width: 1400px;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header-titles h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .header-titles p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            margin-bottom: 2rem;
        }

        .btn {
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem 1.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(72, 106, 90, 0.2);
            text-decoration: none;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #faf9f6;
        }

        .intent-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .intent-info { background: rgba(72, 106, 90, 0.1); color: var(--accent); }
        .intent-commercial { background: rgba(240, 173, 78, 0.15); color: #b7791f; }
        .intent-transactional { background: rgba(72, 187, 120, 0.15); color: #276749; }

        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-logo" title="Hub Nümtema">
                <a href="http://127.0.0.1:8002" style="text-decoration: none; color: inherit;">
                    <i data-lucide="home" style="width: 24px; height: 24px; color: var(--accent);"></i>
                </a>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" title="Module A - Keywords & Intentions">
                    <i data-lucide="key"></i>
                </button>
            </nav>
            <div class="sidebar-footer">
                <a href="/docs" target="_blank" class="nav-item" title="Documentation OpenAPI Swagger (Port 8003)">
                    <i data-lucide="file-code" style="color: var(--accent);"></i>
                </a>
                <div class="user-avatar">NT</div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-titles">
                    <h1>MOTS-CLÉS & INTENTIONS</h1>
                    <p>Module Vertical A — Clustering Sémantique & Analyse d'Intention</p>
                </div>
                <a href="/docs" target="_blank" class="btn btn-secondary" style="font-size: 0.85rem; gap: 0.4rem;">
                    <i data-lucide="file-code"></i> Swagger API (/docs)
                </a>
            </header>

            <section class="card">
                <h2 style="margin-bottom: 1.5rem; font-family: 'Outfit'; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="search" style="color: var(--accent);"></i> Analyser un Sujet ou une Liste de Mots-clés</h2>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                    <input type="text" id="keyword-input" placeholder="Exemple : automatisation des achats, logiciel rh, investir dans l'immobilier..." style="flex-grow: 1; border: 1px solid var(--glass-border); border-radius: 12px; padding: 0.75rem 1rem; font-size: 1rem; outline: none; background: #faf9f6; font-family: inherit;" onkeypress="if(event.key==='Enter') runAnalysis()">
                    <button class="btn" onclick="runAnalysis()"><i data-lucide="sparkles"></i> Analyser avec l'IA</button>
                </div>
            </section>

            <div id="kw-loader" class="loader-container card" style="display: none;">
                <i data-lucide="loader-2" class="spin" style="width: 48px; height: 48px; color: var(--accent); margin-bottom: 1rem;"></i>
                <h3 style="font-family: 'Outfit'; margin-bottom: 0.5rem;">Clustering sémantique en cours...</h3>
                <p style="color: var(--text-secondary); font-size: 0.85rem;">Classification de l'intention sémantique par le modèle LLM...</p>
            </div>

            <div id="kw-results" style="display: none;">
                <div class="card" id="kw-clusters-container">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </main>
    </div>

    <script>
        async function runAnalysis() {
            const input = document.getElementById('keyword-input').value.trim();
            if (!input) {
                alert("Veuillez saisir un sujet ou une liste de mots-clés.");
                return;
            }

            document.getElementById('kw-results').style.display = 'none';
            document.getElementById('kw-loader').style.display = 'flex';

            try {
                const response = await fetch('/api/keywords/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query_or_keywords: input,
                        provider: 'openai',
                        model: 'gpt-4o-mini'
                    })
                });

                if (!response.ok) throw new Error("Erreur lors de l'analyse.");
                const data = await response.json();

                renderClusters(data);
                document.getElementById('kw-results').style.display = 'block';
            } catch (err) {
                alert("Erreur : " + err.message);
            } finally {
                document.getElementById('kw-loader').style.display = 'none';
            }
        }

        function renderClusters(data) {
            const container = document.getElementById('kw-clusters-container');
            container.innerHTML = `<h3 style="font-family: 'Outfit'; font-size: 1.5rem; margin-bottom: 1.5rem;">Cocon Sémantique : ${data.main_topic || 'Sujet'}</h3>`;

            const clusters = data.clusters || [];
            clusters.forEach(c => {
                const block = document.createElement('div');
                block.style.background = '#faf9f6';
                block.style.border = '1px solid var(--glass-border)';
                block.style.borderRadius = '16px';
                block.style.padding = '1.5rem';
                block.style.marginBottom = '1.5rem';

                let badgeClass = 'intent-info';
                if (c.intent.toLowerCase().includes('commerci')) badgeClass = 'intent-commercial';
                if (c.intent.toLowerCase().includes('transaction')) badgeClass = 'intent-transactional';

                let html = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h4 style="font-family: 'Outfit'; font-size: 1.1rem;">Cluster : ${c.intent}</h4>
                        <span class="intent-badge ${badgeClass}">${c.intent}</span>
                    </div>
                    <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">${c.description || ''}</p>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                `;

                (c.keywords || []).forEach(k => {
                    const kwText = typeof k === 'string' ? k : k.keyword;
                    html += `
                        <div style="display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 0.6rem 1rem; border-radius: 10px; border: 1px solid var(--glass-border);">
                            <span style="font-weight: 500;">${kwText}</span>
                            <div style="display: flex; gap: 0.5rem;">
                                <a href="http://127.0.0.1:8001?q=${encodeURIComponent(kwText)}" target="_blank" class="btn btn-secondary" style="padding: 0.25rem 0.6rem; font-size: 0.75rem; gap: 0.2rem;">
                                    <i data-lucide="help-circle" style="width: 12px; height: 12px;"></i> PAA (8001)
                                </a>
                                <a href="http://127.0.0.1:8000?q=${encodeURIComponent(kwText)}" target="_blank" class="btn" style="padding: 0.25rem 0.6rem; font-size: 0.75rem; gap: 0.2rem;">
                                    <i data-lucide="package" style="width: 12px; height: 12px;"></i> Procédure (8000)
                                </a>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                block.innerHTML = html;
                container.appendChild(block);
            });
            lucide.createIcons();
        }

        window.addEventListener('load', () => lucide.createIcons());
    </script>
</body>
</html>
